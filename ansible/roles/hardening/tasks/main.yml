---
# CIS aligned Linux system hardening tasks

- name: Install security packages
  ansible.builtin.apt:
    name:
      - ufw
      - fail2ban
      - auditd
      - unattended-upgrades
    state: present
    update_cache: true

- name: Disable SSH root login
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PermitRootLogin'
    line: 'PermitRootLogin no'
    state: present
  notify: Restart sshd

- name: Disable SSH password authentication
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PasswordAuthentication'
    line: 'PasswordAuthentication no'
    state: present
  notify: Restart sshd

- name: Set SSH max authentication tries
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^MaxAuthTries'
    line: 'MaxAuthTries 3'
    state: present
  notify: Restart sshd

- name: Disable X11 forwarding
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^X11Forwarding'
    line: 'X11Forwarding no'
    state: present
  notify: Restart sshd

- name: Apply kernel hardening parameters
  ansible.posix.sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    sysctl_file: /etc/sysctl.d/99-hardening.conf
    reload: true
    state: present
  loop:
    - { name: net.ipv4.ip_forward, value: "0" }
    - { name: net.ipv4.conf.all.accept_redirects, value: "0" }
    - { name: net.ipv4.conf.all.log_martians, value: "1" }
    - { name: net.ipv4.tcp_syncookies, value: "1" }
    - { name: kernel.randomize_va_space, value: "2" }
    - { name: kernel.dmesg_restrict, value: "1" }
    - { name: fs.protected_hardlinks, value: "1" }
    - { name: fs.protected_symlinks, value: "1" }

- name: Set permissions on sensitive files
  ansible.builtin.file:
    path: "{{ item.path }}"
    mode: "{{ item.mode }}"
    owner: root
    group: root
  loop:
    - { path: /etc/passwd, mode: '0644' }
    - { path: /etc/shadow, mode: '0640' }
    - { path: /etc/group, mode: '0644' }

- name: Enable and configure UFW firewall
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming

- name: Allow SSH through firewall
  community.general.ufw:
    rule: allow
    port: '22'
    proto: tcp

- name: Enable and start fail2ban
  ansible.builtin.service:
    name: fail2ban
    state: started
    enabled: true

- name: Enable and start auditd
  ansible.builtin.service:
    name: auditd
    state: started
    enabled: true

- name: Configure automatic security updates
  ansible.builtin.lineinfile:
    path: /etc/apt/apt.conf.d/20auto-upgrades
    line: "{{ item }}"
    create: true
  loop:
    - 'APT::Periodic::Update-Package-Lists "1";'
    - 'APT::Periodic::Unattended-Upgrade "1";'
